##----------------------------------------------------------------------------##
#                           Quarto Render Information                          #
##----------------------------------------------------------------------------##
project:
  type: website
  output-dir: docs
  post-render:
    - scripts/update-profile-readme.sh
  resources:
    - CNAME

execute: 
  freeze: auto

# ------------------------------------------------------------------- #
#                         Website Configuration                       #
# ------------------------------------------------------------------- #
website:
  title: "Guillaume Gilles"

  # -------------------------- NAVIGATION --------------------------- #
  # offer the user the ability to navigate to the next page (or
  # previous page) at the bottom of the page that they’ve just finished
  # reading
  page-navigation: true
  reader-mode: true

  # Search is enabled by default for websites (you can disable it with
  # search: false).
  search: true

  # RSS feed
  site-url: https://ggilles.dev

  navbar:
    logo: assets/favicon.png 
    title: false     # suppress the display of the title on the navbar.
    left:
      - href: about.qmd
      - href: blog.qmd
      - href: teaching.qmd

  sidebar:
  #--- Statistics & Probability course ---#
    - id: stats-prob
      title: "Probabilities & Statistics"
      contents:
        - teaching/statistics-probability/index.qmd
        - teaching/statistics-probability/notation.qmd
        - section: "Une variable"
          contents:
            - teaching/statistics-probability/univariate.qmd
            - teaching/statistics-probability/probability.qmd
            - teaching/statistics-probability/density-function.qmd
            - teaching/statistics-probability/normal-distribution.qmd
        - section: "Deux variables"
          contents:
            - teaching/statistics-probability/bivariate.qmd
            - teaching/statistics-probability/joint-continuous-random-variables.qmd
        - section: "Convergence et théorèmes limites"
          contents:
            - teaching/statistics-probability/convergence-random-variables.qmd
        - section: "Statistique inférentielle"
          contents:
            - teaching/statistics-probability/sampling-distribution.qmd
            - teaching/statistics-probability/point-estimation.qmd
        - section: "Examens"
          contents:
            - teaching/statistics-probability/exam-1.qmd
            - teaching/statistics-probability/exam-1-correction.qmd
            - teaching/statistics-probability/exam-2.qmd
            - teaching/statistics-probability/exam-2-correction.qmd
        - section: "Ressources"
          contents:
            - teaching/statistics-probability/tables.qmd
            - teaching/statistics-probability/glossary.qmd
            - teaching/statistics-probability/leaderboard.qmd

  #--- Financial Analysis course ---#
    - id: financial-analysis
      title: "Les Stratèges de la Finance"
      contents:
        - teaching/financial-analysis/index.qmd
        - section: "Jour 1"
          contents:
            - teaching/financial-analysis/01-temple-bilans.qmd
            - teaching/financial-analysis/02-archives-consolidees.qmd
            - teaching/financial-analysis/03-detective-diagnostic.qmd
        - section: "Jour 2"
          contents:
            - teaching/financial-analysis/04-arenes-rentabilite.qmd
            - teaching/financial-analysis/05-cartographes-modele-eco.qmd
            - teaching/financial-analysis/06-conseil-sages.qmd
        - section: "Jour 3"
          contents:
            - teaching/financial-analysis/07-veilleurs-marche.qmd
            - teaching/financial-analysis/08-architectes-strategie.qmd
            - teaching/financial-analysis/09-gardiens-extra-financier.qmd
        - section: "Ressources"
          contents:
            - teaching/financial-analysis/banque-france.qmd
            - teaching/financial-analysis/banque-france-cotation.qmd

  #--- Artificial Intelligence ---#
    - id: artificial-intelligence
      title: "Artificial Intelligence"
      contents:
        - teaching/ai/index.qmd
        - teaching/ai/learning-paradigms.qmd
        - section: "**Foundational Papers**"
          contents:
            - teaching/ai/perceptron.qmd
        - section: teaching/ai/machine-learning.qmd
          contents:
            - teaching/ai/cross-validation.qmd
            - teaching/ai/parsnip.qmd
        - section: teaching/ai/deep-learning.qmd
          contents: []
        - section: teaching/ai/transformers.qmd
          contents:
            - teaching/ai/foundation-models.qmd
            - teaching/ai/hg-transformers.qmd
        - section: "**Concepts & Glossary**"
          contents:
            - teaching/ai/activation-functions.qmd
            - teaching/ai/loss-function.qmd
            - teaching/ai/optimizers.qmd
            - teaching/ai/tensors.qmd
        - section: "**Resources**"
          contents:
            - teaching/ai/fundamental-papers.qmd
            - teaching/ai/references.qmd
            - teaching/ai/jupyter.qmd
            - teaching/ai/kaggle.qmd

  # -------------------------- SOCIAL METADA ------------------------ #
  # The favicon for your site provides an icon for browser tabs and
  # other sites that link to yours
  favicon: assets/favicon.png

  page-footer:
    left: "Built with [Quarto](https://quarto.org) · Source on [<i class='bi bi-github'></i> GitHub](https://github.com/guillaumegilles/guillaumegilles.github.io)"
    center: "This site respects your privacy — no cookies, no tracking."

  # Enhanced appearance when someone links to your site on Twitter
  twitter-card:
    image: assets/og-image.png
    card-style: summary_large_image

  # Open Graph protocol is a specification that enables richer sharing
  # of links to articles on the web
  open-graph:
    image: assets/og-image.png


# ------------------------------------------------------------------- #
#                             HTML Configuration                      #
# ------------------------------------------------------------------- #
format:
  html:
    smooth-scroll: true
    citations-hover: true
    citation-location: margin
    reference-location: margin
    theme: assets/dark.scss
