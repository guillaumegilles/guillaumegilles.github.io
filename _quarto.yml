project:
  type: website
  output-dir: docs
  resources:
    - CNAME


# ------------------------------------------------------------------- #
#                         Website Configuration                       #
# ------------------------------------------------------------------- #
website:
  title: "Guillaume Gilles"

  # -------------------------- NAVIGATION --------------------------- #
  # offer the user the ability to navigate to the next page (or
  # previous page) at the bottom of the page that they’ve just finished
  # reading
  page-navigation: true

  navbar:
    logo: assets/favicon.png 
    title: false     # suppress the display of the title on the navbar.
    left:
      - href: about/index.qmd
        text: "About"
      - href: blog.qmd
      - href: projects.qmd
      - href: teaching.qmd

  sidebar:
  #--- Financial Analysis course ---#
    - id: financial-analysis
      title: "Les Stratèges de la Finance"
      contents:
        - teaching/financial-analysis/index.qmd
        - section: "Jour 1"
          contents:
            - teaching/financial-analysis/01-temple-bilans.qmd
            - teaching/financial-analysis/02-archives-consolidees.qmd
            - teaching/financial-analysis/03-detective-diagnostic.qmd
        - section: "Jour 2"
          contents:
            - teaching/financial-analysis/04-arenes-rentabilite.qmd
            - teaching/financial-analysis/05-cartographes-modele-eco.qmd
            - teaching/financial-analysis/06-conseil-sages.qmd
        - section: "Jour 3"
          contents:
            - teaching/financial-analysis/07-veilleurs-marche.qmd
            - teaching/financial-analysis/08-architectes-strategie.qmd
            - teaching/financial-analysis/09-gardiens-extra-financier.qmd
        - section: "Ressources"
          contents:
            - teaching/financial-analysis/banque-france.qmd
            - teaching/financial-analysis/banque-france-cotation.qmd

  #--- Statistics & Probability course ---#
    - id: stats-prob
      title: "Probabilities & Statistics"
      contents:
        - teaching/statistics-probability/index.qmd
        - section: "Descriptive Statistics"
          contents:
            - teaching/statistics-probability/classes/density-function.qmd
            - teaching/statistics-probability/classes/normal-distribution.qmd
            - teaching/statistics-probability/classes/joint-continuous-variables.qmd
            - teaching/statistics-probability/classes/univariate-descriptive-statistics.qmd
            - teaching/statistics-probability/classes/bivariate-descriptive-statistics.qmd
            - teaching/statistics-probability/classes/sampling-distribution.qmd
          #  - teaching/statistics-probability/
          #  - teaching/statistics-probability/

# Bloc 6 (Distributions d’échantillonnage) -> worksheet-distribution-echantillonnage.qmd
# Bloc 7 (Convergence de variables aléatoires) -> worksheet-convergence-variables-aleatoires.qmd
#            - teaching/statistics-probability/descriptive-statistics.qmd
#        - section: "Tutorials"
#          contents:
#            - teaching/statistics-probability/td.qmd
#        - teaching/statistics-probability/leaderboard.qmd
#        - teaching/statistics-probability/references.qmd

  # Search is enabled by default for websites (you can disable it with
  # search: false).
  search: true

  # RSS feed
  site-url: https://ggilles.dev

  # -------------------------- SOCIAL METADA ------------------------ #
  # The favicon for your site provides an icon for browser tabs and
  # other sites that link to yours
  favicon: assets/favicon.png

  # Enhanced appearance when someone links to your site on Twitter
  twitter-card: true

  # Open Graph protocol is a specification that enables richer sharing
  # of links to articles on the web
  open-graph: true

  # ---------------------------- FOOTER ----------------------------- #
  page-footer:
    border: true
    left: |
      2025 - 2026 ·
      Built with [Quarto](https://quarto.org) and my 🐈‍⬛ ·
      [Source <i class="bi bi-github"></i>](https://github.com/guillaumegilles/guillaumegilles.github.io)
    right:
      - icon: rss
        href: https://ggilles.dev/blog.xml
      - icon: linkedin
        href: https://www.linkedin.com/in/guillaumegilles
      - icon: github
        href: https://github.com/guillaumegilles
      - icon: box
        href: https://app.hackthebox.com/profile/2425807
      - icon: cloud-rain
        href: https://tryhackme.com/p/skekCoon


# ------------------------------------------------------------------- #
#                             HTML Configuration                      #
# ------------------------------------------------------------------- #
format:
  html:
    toc: true
    smooth-scroll: true
    citations-hover: true
    citation-location: margin
    reference-location: margin
    include-in-header: assets/head-indieweb.html
    theme:
      light: assets/light.scss
      dark: assets/dark.scss

