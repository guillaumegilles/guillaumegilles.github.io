##----------------------------------------------------------------------------##
#                           Quarto Render Information                          #
##----------------------------------------------------------------------------##
project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!*.md"
  post-render:
    - scripts/update-profile-readme.sh
  resources:
    - CNAME

execute:
  freeze: auto

# ------------------------------------------------------------------- #
#                         Website Configuration                       #
# ------------------------------------------------------------------- #
website:
  title: "Guillaume Gilles"

  # -------------------------- NAVIGATION --------------------------- #
  # offer the user the ability to navigate to the next page (or
  # previous page) at the bottom of the page that they’ve just finished
  # reading
  page-navigation: true
  reader-mode: true

  # Search is enabled by default for websites (you can disable it with
  # search: false).
  search: true

  # RSS feed
  site-url: https://ggilles.dev

  navbar:
    logo: assets/favicon.png
    title: "Guillaume Gilles"
    left:
      - href: about.qmd
      - href: blog.qmd
      - href: teaching.qmd

  sidebar:
    #--- Statistics & Probability course ---#
    - id: ece-proba
      title: "Probabilities & Statistics"
      contents:
        - teaching/statistics-probability/index.qmd
        - section: teaching/statistics-probability/univariate.qmd
          contents:
            - teaching/ece-proba/univariate-data-analysis.qmd
            - teaching/ece-proba/univariate-cdf.qmd
            - teaching/ece-proba/univariate-central-tendency.qmd
            - teaching/ece-proba/probability.qmd
            - teaching/ece-proba/density-function.qmd
            - teaching/ece-proba/normal-distribution.qmd
        - section: "Deux variables"
          contents:
            - teaching/ece-proba/bivariate.qmd
            - teaching/ece-proba/joint-continuous-random-variables.qmd
            - teaching/ece-proba/double-integrals-over-r2.qmd
            - teaching/ece-proba/pair-continuous-rv-joint-distribution.qmd
            - teaching/ece-proba/pair-continuous-rv-marginal-distribution.qmd
            - teaching/ece-proba/revision-two-variables.qmd
        - section: "Convergence et théorèmes limites"
          contents:
            - teaching/ece-proba/convergence-random-variables.qmd
        - section: "Statistique inférentielle"
          contents:
            - teaching/ece-proba/sampling-distribution.qmd
            - teaching/ece-proba/point-estimation.qmd
        - section: "Ressources"
          contents:
            - teaching/ece-proba/notation.qmd
            - teaching/ece-proba/tables.qmd
            - teaching/ece-proba/glossary.qmd
            - teaching/ece-proba/leaderboard.qmd
            - teaching/ece-proba/final-revision.qmd
            - teaching/ece-proba/final-revision-correction.qmd
            - teaching/ece-proba/final-revision-2.qmd
            - teaching/ece-proba/final-revision-2-correction.qmd

    #--- Financial Analysis course ---#
    - id: financial-analysis
      title: "Les Stratèges de la Finance"
      contents:
        - teaching/financial-analysis/index.qmd
        - section: "Jour 1"
          contents:
            - teaching/financial-analysis/01-temple-bilans.qmd
            - teaching/financial-analysis/02-archives-consolidees.qmd
            - teaching/financial-analysis/03-detective-diagnostic.qmd
        - section: "Jour 2"
          contents:
            - teaching/financial-analysis/04-arenes-rentabilite.qmd
            - teaching/financial-analysis/05-cartographes-modele-eco.qmd
            - teaching/financial-analysis/06-conseil-sages.qmd
        - section: "Jour 3"
          contents:
            - teaching/financial-analysis/07-veilleurs-marche.qmd
            - teaching/financial-analysis/08-architectes-strategie.qmd
            - teaching/financial-analysis/09-gardiens-extra-financier.qmd
        - section: "Ressources"
          contents:
            - teaching/financial-analysis/banque-france.qmd
            - teaching/financial-analysis/banque-france-cotation.qmd

    #--- Mathematical Analysis course ---#
    - id: mathematical-analysis
      title: "Mathematical Analysis"
      contents:
        - teaching/mathematical-analysis/index.qmd
        - section: "**Module 1 - Derivées et Élasticité**"
          contents:
            - teaching/mathematical-analysis/derivatives.qmd
            - teaching/mathematical-analysis/elasticity.qmd
        - section: "**Module 2 - Optimisation univariée**"
          contents:
            - teaching/mathematical-analysis/intro-optimization.qmd
        - section: "**Module 3 - Fonctions bivariées**"
          contents:
            - teaching/mathematical-analysis/bivariate.qmd
        - section: "**Module 4 - Optimisation bivariée**"
          contents:
            - teaching/mathematical-analysis/matrices.qmd
        - section: "**Module 5 - Recherche operationnelle**"
          contents:
            - teaching/mathematical-analysis/operations-research.qmd
        - section: "**Révisions**"
          contents:
            - teaching/mathematical-analysis/revision-midterm.qmd
            - teaching/mathematical-analysis/revision-final.qmd
            - teaching/mathematical-analysis/revision-final-2.qmd

    #--- Artificial Intelligence ---#
    - id: ai-papers
      title: "AI Fundamental Papers"
      contents:
        - teaching/ai-papers/index.qmd
        - teaching/ai-papers/learning-paradigms.qmd
        - section: "**Foundational Papers**"
          contents:
            - teaching/ai-papers/perceptron.qmd
        - section: teaching/ai-papers/machine-learning.qmd
          contents:
            - teaching/ai-papers/cross-validation.qmd
            - teaching/ai-papers/parsnip.qmd
        - section: teaching/ai-papers/deep-learning.qmd
          contents: []
        - section: teaching/ai-papers/transformers.qmd
          contents:
            - teaching/ai-papers/foundation-models.qmd
            - teaching/ai-papers/hg-transformers.qmd
        - section: "**Concepts & Glossary**"
          contents:
            - teaching/ai-papers/activation-functions.qmd
            - teaching/ai-papers/loss-function.qmd
            - teaching/ai-papers/optimizers.qmd
            - teaching/ai-papers/tensors.qmd
        - section: "**Resources**"
          contents:
            - teaching/ai-papers/fundamental-papers.qmd
            - teaching/ai-papers/references.qmd
            - teaching/ai-papers/jupyter.qmd
            - teaching/ai-papers/kaggle.qmd

    #--- Artificial Intelligence ---#
    - id: ai-dev
      title: "AI Assisted Develpment"
      contents:
        - teaching/ai-dev/index.qmd
        - teaching/ai-dev/mcp.qmd
        - teaching/ai-dev/prompt-engineering.qmd
        - teaching/ai-dev/sdd.qmd
        - teaching/ai-dev/sdd-get-started.qmd
        - teaching/ai-dev/skills.qmd
        - teaching/ai-dev/vibe-coding.qmd
        - section: teaching/ai-dev/ai-agents.qmd
          contents:
            - teaching/ai-dev/copilot.qmd

  # -------------------------- SOCIAL METADA ------------------------ #
  # The favicon for your site provides an icon for browser tabs and
  # other sites that link to yours
  favicon: assets/favicon.png

  page-footer:
    left: "Built with [Quarto](https://quarto.org) · Source on [<i class='bi bi-github'></i> GitHub](https://github.com/guillaumegilles/guillaumegilles.github.io)"
    center: "This site respects your privacy — no cookies, no tracking."

  # Enhanced appearance when someone links to your site on Twitter
  twitter-card:
    image: assets/og-image.png
    card-style: summary_large_image

  # Open Graph protocol is a specification that enables richer sharing
  # of links to articles on the web
  open-graph:
    image: assets/og-image.png

# ------------------------------------------------------------------- #
#                             HTML Configuration                      #
# ------------------------------------------------------------------- #
format:
  html:
    smooth-scroll: true
    citations-hover: true
    citation-location: margin
    reference-location: margin
    theme: assets/dark.scss
